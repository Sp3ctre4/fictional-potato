{
    "device.node_id": "opencanary-1",
    "device.listen_addr": "172.16.10.25",
    "device.name": "PluckyPuffle",
    "device.desc": "Development canary system",
    "ip.ignorelist": [],
    "logtype.ignorelist": [1000,1001,1002,1004,1005,1006],
    "ssh.enabled": true,
    "ssh.port": 22,
    "ssh.version": "SSH-2.0-OpenSSH_10.2p1 Ubuntu-2ubuntu3.4",
    "smb.enabled": true,
    "smb.auditfile": "/var/log/samba-audit.log",
    "llmnr.enabled": true,
    "llmnr.query_interval": 60,
    "llmnr.query_splay": 5,
    "llmnr.hostname": "fileshare-d5UmeOp3q",
    "llmnr.port": 5355,
    "portscan.enabled": true,
    "portscan.logfile": "/var/log/kern.log",
    "portscan.synrate": 3,
    "portscan.nmaposrate": 3,
    "portscan.lorate": 3,
    "portscan.ignore_localhost": true,
    "logger": {
        "class": "PyLogger",
        "kwargs": {
            "formatters": {
                "plain": {
                    "format": "%(message)s"
                },
                "syslog_rfc": {
                    "format": "opencanaryd[%(process)-5s:%(thread)d]: %(name)s %(levelname)-5s %(message)s"
                }
            },
            "handlers": {
                "console": {
                    "class": "logging.StreamHandler",
                    "stream": "ext://sys.stdout"
                },
                "file": {
                    "class": "logging.FileHandler",
                    "filename": "/var/tmp/opencanary.log"
                }
            }
        }
    }
}
