{
    "device.node_id": "opencanary-1",
    "device.listen_addr": "172.16.10.25",
    "ip.ignorelist": [],
    "logtype.ignorelist": [1001],
    "ssh.enabled": true,
    "ssh.port": 22,
    "ssh.version": "SSH-2.0-OpenSSH_10.2p1 Ubuntu-2ubuntu3.4",
    "smb.enabled": true,
    "smb.auditfile": "/var/log/samba-audit.log",
    "llmnr.enabled": true,
    "llmnr.query_interval": 60,
    "llmnr.query_splay": 5,
    "llmnr.hostname": "fileshare-adddjoawlk",
    "llmnr.port": 5355,
    "logger": {
        "class": "PyLogger",
        "kwargs": {
            "formatters": {
                "plain": {
                    "format": "%(message)s"
                },
                "syslog_rfc": {
                    "format": "opencanaryd[%(process)-5s:%(thread)d]: %(name)s %(levelname)-5s %(message)s"
                }
            },
            "handlers": {
                "console": {
                    "class": "logging.StreamHandler",
                    "stream": "ext://sys.stdout"
                },
                "file": {
                    "class": "logging.FileHandler",
                    "filename": "/var/tmp/opencanary.log"
                },
		        "teams": {
		            "class": "opencanary.logger.TeamsHandler",
		            "webhook_url": 09333-link-09333
                }
            }
        }
    }
}
